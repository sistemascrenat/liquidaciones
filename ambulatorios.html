<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Clínica Rennat – Ambulatorios</title>
  <link rel="icon" type="image/png" href="logoCR.png">
  <link rel="stylesheet" href="estilos.css"/>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<body>
  <div class="container">
    <!-- SIDEBAR (inyectado) -->
    <div id="sidebar-slot"></div>

    <!-- MAIN -->
    <main class="main">
      <div class="topbar">
        <div>
          <div class="h1">Procedimientos Ambulatorios</div>
          <div class="muted" id="who"></div>
        </div>
        <div class="badge" id="count">0 ambulatorios</div>
      </div>

      <!-- TOOLBAR -->
      <section class="card" style="margin-bottom:14px;">
        <div class="actions" style="gap:10px;">
          <button class="btn primary" id="btnCrear">+ Crear Nuevo Ambulatorio</button>

          <button class="btn" id="btnDescargarPlantilla">⬇️ Plantilla XLSX</button>
          <button class="btn" id="btnExportar">⬇️ Exportar XLSX</button>
          <button class="btn" id="btnImportar">⬆️ Importar XLSX</button>
          <input id="fileXLSX" type="file" accept=".xlsx,.xls,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet,application/vnd.ms-excel" style="display:none;"/>

          <span style="flex:1"></span>

          <input
            id="buscador"
            placeholder="Buscar (código, archivo, categoría, tratamiento, tarifa). (,)=y, (-)=o"
            style="max-width:620px;"
          />
        </div>
      </section>

      <!-- TABLE -->
      <section class="card">
        <div class="tableWrap">
          <table class="simpleTable">
            <thead>
              <tr>
                <th style="min-width:110px;">Código</th>
                <th style="min-width:130px;">Archivo</th>
                <th style="min-width:180px;">Categoría</th>
                <th style="min-width:320px;">Tratamiento</th>
                <th style="min-width:360px;">Tarifa</th>
                <th style="min-width:90px;">Estado</th>
                <th style="width:120px;">Acciones</th>
              </tr>
            </thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <!-- MODAL CREAR/EDITAR -->
  <div id="modalProcBackdrop" class="modalBackdrop" style="display:none;">
    <div class="modalCard" role="dialog" aria-modal="true" style="width:min(1000px, 96vw);">
      <div class="modalHead">
        <div>
          <div class="h1" id="modalProcTitle" style="margin:0;font-size:18px;">Crear procedimiento ambulatorio</div>
          <div class="muted" id="modalProcSub" style="font-size:12px;margin-top:2px;"></div>
        </div>
        <button class="iconBtn" id="btnProcClose" type="button" aria-label="Cerrar" title="Cerrar">✖️</button>
      </div>

      <div class="modalBody">
        <div class="grid" style="grid-template-columns: 1fr 1fr; gap:12px;">
          <div>
            <label>Código</label>
            <input id="procCodigo" placeholder="PA0001"/>
          </div>

          <div>
            <label>Estado</label>
            <select id="procEstado">
              <option value="activa">Activa</option>
              <option value="inactiva">Inactiva</option>
            </select>
          </div>

          <div>
            <label>Archivo</label>
            <input id="procArchivo" placeholder="Ej: RESERVO / MK"/>
          </div>

          <div>
            <label>Categoría</label>
            <input id="procCategoria" placeholder="Ej: Nutrición"/>
          </div>

          <div style="grid-column:1/-1;">
            <label>Tratamiento</label>
            <input id="procTratamiento" placeholder="Ej: Consulta Nutrición Bariátrica Telemedicina"/>
          </div>
        </div>

        <div style="height:14px;"></div>

        <section class="card" style="padding:14px;">
          <div style="font-weight:900; margin-bottom:10px;">Tarifa</div>

          <div class="grid" style="grid-template-columns: 1fr 1fr; gap:12px;">
            <div>
              <label>Modo de valor</label>
              <select id="tarModoValor">
                <option value="fijo">Fijo</option>
                <option value="archivo">Desde archivo</option>
              </select>
            </div>

            <div id="rowTarValor">
              <label>Valor</label>
              <input id="tarValor" inputmode="numeric" placeholder="0"/>
            </div>

            <div id="rowTarColumna" style="display:none;">
              <label>Columna origen</label>
              <input id="tarColumnaOrigen" placeholder="Ej: Total"/>
            </div>

            <div>
              <label>Comisión %</label>
              <input id="tarComisionPct" inputmode="decimal" placeholder="0"/>
            </div>

            <div>
              <label>Valor a pagar profesional</label>
              <input id="tarValorProfesional" inputmode="numeric" placeholder="0"/>
            </div>
          </div>

          <div style="height:12px;"></div>

          <div class="grid" style="grid-template-columns: 1fr 1fr; gap:12px;">
            <div class="card" style="padding:12px; border-radius:14px;">
              <div class="mini muted">Totales</div>
              <div id="tarTotales" style="font-weight:900; line-height:1.35;"></div>
            </div>

            <div class="card" style="padding:12px; border-radius:14px;">
              <div class="mini muted" style="margin-bottom:6px;">Resumen</div>
              <div id="tarResumen" style="font-weight:900;"></div>
              <div class="mini muted" id="tarHint" style="margin-top:8px;"></div>
            </div>
          </div>
        </section>
      </div>

      <div class="modalFoot">
        <button class="btn" id="btnProcCancelar" type="button">Cancelar</button>
        <span style="flex:1"></span>
        <button class="btn primary" id="btnProcGuardar" type="button">Guardar</button>
      </div>
    </div>
  </div>

  <script type="module" src="layout.js"></script>
  <script type="module" src="ambulatorios.js"></script>
</body>
</html>
