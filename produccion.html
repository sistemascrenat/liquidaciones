<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Clínica Rennat — Producción</title>
  <link rel="icon" type="image/png" href="logoCR.png">
  <link rel="stylesheet" href="estilos.css"/>
</head>

<body>
  <div class="appShell">
    <div id="sidebar-slot"></div>

    <main class="content">

      <!-- TOP -->
      <div class="topbar">
        <div>
          <h1 class="h1">Carga de Producción Mensual</h1>
          <div class="sub" id="who">Conectado: —</div>
        </div>
        <div class="pillCount" id="countPill">0 filas</div>
      </div>

      <!-- IMPORTACIÓN -->
      <section class="card">

        <div class="grid3">
          <div class="field">
            <label>Mes</label>
            <select id="mes">
              <option>Enero</option><option>Febrero</option><option>Marzo</option><option>Abril</option>
              <option>Mayo</option><option>Junio</option><option>Julio</option><option>Agosto</option>
              <option>Septiembre</option><option>Octubre</option><option>Noviembre</option><option>Diciembre</option>
            </select>
          </div>

          <div class="field">
            <label>Año</label>
            <input id="ano" type="number"/>
          </div>

          <div class="field">
            <label>Importación</label>
            <select id="importSelect">
              <option value="">(Selecciona una importación)</option>
            </select>
            <input id="importId" type="hidden"/>
          </div>
        </div>

        <div class="divider"></div>

        <div class="rowActions">

          <div class="field" style="min-width:350px;">
            <label>Archivo CSV</label>
            <input id="fileCSV" type="file" accept=".csv"/>
          </div>

          <button class="btn primary" id="btnCargar" type="button">
            Cargar CSV
          </button>

          <button class="btn" id="btnCargarImport" type="button">
            Cargar Import
          </button>

          <button class="btn soft" id="btnResolver" type="button" disabled>
            Resolver pendientes
          </button>

          <button class="btn soft" id="btnConfirmar" type="button" disabled>
            Confirmar importación
          </button>

          <button class="btn danger" id="btnAnular" type="button" disabled>
            Anular importación
          </button>

          <span class="pill ok" id="dirtyPill">
            Cambios en cola: 0
          </span>

          <button class="btn soft" id="btnGuardarCola" type="button">
            Guardar cola
          </button>

          <span class="muted tiny" id="statusInfo">—</span>
        </div>

        <div class="divider"></div>

        <div style="display:flex; gap:10px; flex-wrap:wrap;">
          <span class="pill" id="pillPendientes">Pendientes: 0</span>
          <span class="pill" id="pillClinicas">Clínicas: 0</span>
          <span class="pill" id="pillCirugias">Cirugías: 0</span>
          <span class="pill" id="pillAmb">Ambulatorios: 0</span>
          <span class="pill" id="pillProf">Profesionales: 0</span>
          <span class="muted tiny" id="hintResolver">
            Cargar CSV → Resolver → Confirmar
          </span>
        </div>

      </section>

      <!-- PREVIEW -->
      <section class="card" style="margin-top:14px;">

        <div class="pagerRow">

          <div class="field" style="min-width:320px;">
            <label>Buscar</label>
            <input id="q" placeholder="Buscar en todas las filas"/>
          </div>

          <span class="muted tiny" id="pagerInfo">—</span>
          <span style="flex:1"></span>

          <button class="btn small" id="btnPrev" type="button">⬅️</button>
          <div id="pagerTabs" class="pagerTabs"></div>
          <button class="btn small" id="btnNext" type="button">➡️</button>
        </div>

        <div class="tableWrap">
          <table>
            <thead id="thead"></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>

      </section>

      <!-- MODAL RESOLVER -->
      <div id="modalResolverBackdrop" class="modalBackdrop">
        <div class="modalCard">

          <div class="modalHead">
            <div>
              <div class="h1" style="font-size:18px;">Resolver pendientes</div>
              <div class="muted tiny" id="resolverSub">
                Asociar faltantes antes de confirmar
              </div>
            </div>
            <button class="iconBtn" id="btnResolverClose">✖️</button>
          </div>

          <div class="modalBody">
            <div id="resolverResumen"></div>
            <div id="resolverProfesionalesList"></div>
            <div id="resolverClinicasList"></div>
            <div id="resolverAmbList"></div>
            <div id="resolverCirugiasList"></div>
          </div>

          <div class="modalFoot">
            <button class="btn" id="btnResolverCancelar">Cerrar</button>
            <span style="flex:1"></span>
            <button class="btn primary" id="btnResolverRevisar">
              Recalcular pendientes
            </button>
          </div>

        </div>
      </div>

      <!-- MODAL ITEM -->
      <div id="modalItemBackdrop" class="modalBackdrop">
        <div class="modalCard">

          <div class="modalHead">
            <div>
              <div class="h1" style="font-size:18px;">Detalle de item</div>
              <div class="muted tiny" id="itemSub">—</div>
            </div>
            <button class="iconBtn" id="btnItemClose">✖️</button>
          </div>

          <div class="modalBody">
            <div id="itemForm"></div>
          </div>

          <div class="modalFoot">
            <button class="btn" id="btnItemCancelar">Cerrar</button>
            <span style="flex:1"></span>
            <button class="btn soft" id="btnGuardarTodo">
              Agregar a cola
            </button>
            <button class="btn primary" id="btnGuardarItem">
              Guardar item
            </button>
          </div>

        </div>
      </div>

      <script type="module" src="layout.js"></script>
      <script type="module" src="produccion.js"></script>

    </main>
  </div>
</body>
</html>
